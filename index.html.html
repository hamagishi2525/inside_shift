<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','YuGothic',sans-serif;background:#F0F4FF}
input,select,textarea,button{font-family:inherit}
input[type=checkbox]{accent-color:#3B82F6}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
.chip{display:inline-flex;align-items:center;gap:3px;border-radius:20px;padding:3px 8px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;border:2px solid transparent;transition:all .15s}
.chip-req{border-style:dashed}
.chip-conf{opacity:1}
.slot-morning-conf{background:#FEF3C7;color:#92400E;border-color:#F59E0B}
.slot-morning-req{background:#fff;color:#92400E;border-color:#F59E0B}
.slot-afternoon-conf{background:#DBEAFE;color:#1E40AF;border-color:#3B82F6}
.slot-afternoon-req{background:#fff;color:#1E40AF;border-color:#3B82F6}
.slot-evening-conf{background:#EDE9FE;color:#5B21B6;border-color:#8B5CF6}
.slot-evening-req{background:#fff;color:#5B21B6;border-color:#8B5CF6}
.day-cell{min-width:110px;padding:6px 5px;border-right:1px solid #E2E8F0;border-bottom:1px solid #E2E8F0;vertical-align:top;background:#fff;min-height:70px}
.day-cell:hover .add-btn{opacity:1}
.add-btn{opacity:0;background:none;border:1px dashed #CBD5E1;border-radius:8px;padding:2px 6px;font-size:10px;color:#94A3B8;cursor:pointer;margin-top:3px;width:100%}
.staff-row{background:#fff}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:#fff;border-radius:16px;padding:28px;width:min(480px,95vw);box-shadow:0 25px 60px rgba(0,0,0,.2)}
.btn{padding:8px 18px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:#3B82F6;color:#fff}
.btn-primary:hover{background:#2563EB}
.btn-danger{background:#EF4444;color:#fff}
.btn-ghost{background:none;border:1.5px solid #E2E8F0;color:#374151}
.btn-ghost:hover{background:#F8FAFC}
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:12px;padding:3px 10px;font-size:12px;font-weight:700}
.tab{padding:8px 18px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:transparent;color:#64748B;transition:all .15s}
.tab.active{background:#fff;color:#1E40AF;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.inp{width:100%;padding:9px 12px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:14px;outline:none;transition:border .15s;background:#fff}
.inp:focus{border-color:#3B82F6}
.lbl{font-size:12px;color:#64748B;font-weight:700;margin-bottom:5px;display:block}
.confirm-banner{background:linear-gradient(135deg,#EFF6FF,#F0FDF4);border:1.5px solid #BFDBFE;border-radius:12px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:8px;font-size:12px;color:#1E40AF}
</style>

    // Fallback polling every 12s in case realtime is not enabled

      if(rd&&cos.length){

        if(coRows.length)await sb.from('is_companies').insert(coRows);
      }
      loadAll();setRecModal(null);
    }catch(e){alert('保存エラー: '+e.message)}
  };
  const deleteRecord=async(id)=>{if(!window.confirm('削除しますか？'))return;await sb.from('is_records').delete().eq('id',id);loadAll()};

  const copyFromPrevMonth=async()=>{
    setCopying(true);
    const prevY=month===1?year-1:year;const prevMo=month===1?12:month-1;
    const{data:src}=await sb.from('is_shifts').select('*').eq('year',prevY).eq('month',prevMo);
    if(!src||src.length===0){alert('前月のシフトデータがありません');setCopying(false);return}
    const filtered=copyStaff==='all'?src:src.filter(s=>s.staff_name===copyStaff);
    const maxDay=getDays(year,month);
    const rows=filtered.filter(s=>s.day<=maxDay).map(({id,updated_at,...s})=>({...s,year,month,updated_at:new Date().toISOString()}));
    if(rows.length>0)await sb.from('is_shifts').upsert(rows,{onConflict:'year,month,day,slot,staff_name'});
    await loadAll();setCopying(false);setCopyModal(false);alert(`${rows.length}件のシフトをコピーしました！`);
  };
  const copyDayToDay=async()=>{
    if(!copyFrom||copyTo.length===0){alert('コピー元とコピー先を選択してください');return}
    setCopying(true);
    const fromDay=parseInt(copyFrom);
    const{data:src}=await sb.from('is_shifts').select('*').eq('year',year).eq('month',month).eq('day',fromDay);
    if(!src||src.length===0){alert(`${fromDay}日にシフトデータがありません`);setCopying(false);return}
    const filtered=copyStaff==='all'?src:src.filter(s=>s.staff_name===copyStaff);
    const rows=[];
    for(const toDay of copyTo){
      filtered.forEach(({id,updated_at,...s})=>rows.push({...s,day:parseInt(toDay),updated_at:new Date().toISOString()}));
    }
    if(rows.length>0)await sb.from('is_shifts').upsert(rows,{onConflict:'year,month,day,slot,staff_name'});
    await loadAll();setCopying(false);setCopyModal(false);alert(`${copyTo.length}日分にコピーしました！`);
  };
  const prevM=()=>{if(month===1){setYear(y=>y-1);setMonth(12)}else setMonth(m=>m-1)};
  const nextM=()=>{if(month===12){setYear(y=>y+1);setMonth(1)}else setMonth(m=>m+1)};

  const days=getDays(year,month);
  const dArr=Array.from({length:days},(_,i)=>i+1);

  const getStats=(staff)=>{
    let pl=0,ac=0;
    for(let d=1;d<=days;d++) for(const sl of SLOTS){

      if(sh?.requested)pl+=sl.hours;
      if(sh?.confirmed_start&&sh?.confirmed_end)ac+=Math.max(0,pH(sh.confirmed_end)-pH(sh.confirmed_start));

    const recs=records.filter(r=>r.staff_name===staff);
    return{

      callIn:recs.reduce((s,r)=>s+(r.call_in||0),0),

          {tab==='shift'&&<button onClick={()=>setCopyModal(true)} style={{background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:8,padding:'5px 14px',cursor:'pointer',fontSize:12,color:'#1D4ED8',fontWeight:700}}>📋 シフトコピー</button>}
          <button onClick={loadAll} style={{background:'none',border:'1px solid #E2E8F0',borderRadius:8,padding:'5px 12px',cursor:'pointer',fontSize:12,color:'#64748B'}}>🔄 更新</button>
        </div>
      </div>

      <div style={{padding:'16px 16px'}}>

                        <div style={{fontSize:16,fontWeight:800}}>{d}</div>
                        <div style={{fontSize:10,opacity:.7}}>{DNAMES[dow]}</div>
                      </th>;

                </thead>
                <tbody>
                  {STAFF.map(staff=>{
                    const sc=SCOLOR[staff];
                    return<tr key={staff} style={{background:'#fff'}}>

                          <div>
                            <div style={{fontWeight:700,fontSize:12,color:sc.txt}}>{staff}</div>

                        </div>
                        {(()=>{
                          const draftCount=Object.entries(shifts).filter(([k,v])=>{const parts=k.split('|');return parts[2]===staff&&!v.requested&&!v.confirmed_start}).length;
                          const canSubmit=currentUser===staff||isAdmin;
                          return draftCount>0&&canSubmit?(
                            <button onClick={()=>submitShifts(staff)} style={{marginTop:6,width:'100%',background:'#3B82F6',border:'none',color:'#fff',borderRadius:8,padding:'4px 6px',fontSize:10,cursor:'pointer',fontWeight:700}}>
                              📤 提出する ({draftCount}件)
                            </button>
                          ):null;
                        })()}
                      </td>
                      {dArr.map(d=>{
                        const cellShifts=SLOTS.map(sl=>({sl,sh:shifts[`${d}|${sl.id}|${staff}`]}));
                        const hasAny=cellShifts.some(({sh})=>sh?.requested||sh?.confirmed_start);
                        const canEdit=isAdmin||currentUser===staff;
                        return<td key={d} className="day-cell">
                          {cellShifts.map(({sl,sh})=>(

                              onRemove={(slotObj,isDraft)=>removeShift(d,slotObj.id,staff,isDraft)}
                            />:null

                          {canEdit&&<button className="add-btn" onClick={()=>setModal({day:d,staff,cellShifts})}>＋ シフト追加</button>}
                        </td>;

              {SLOTS.map(sl=><span key={sl.id} style={{display:'flex',gap:4,alignItems:'center'}}>

                <span className={`chip slot-${sl.cls}-conf`} style={{fontSize:11}}>{sl.label} ✓確定</span>
              </span>)}
            </div>
            {/* Monthly summary */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginTop:14}}>

                    <span style={{fontWeight:800,color:sc.txt}}>{staff}</span>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                    {[{l:'予定時間',v:fH(st.planned)+'h',bg:'#F8FAFC'},{l:'実績時間',v:fH(st.actual)+'h',bg:sc.bg},{l:'架電数',v:st.callOut,bg:'#ECFDF5'},{l:'アポ数',v:st.appo,bg:'#FEF3C7'}].map(item=>(
                      <div key={item.l} style={{background:item.bg,borderRadius:10,padding:'8px',textAlign:'center'}}>
                        <div style={{fontSize:10,color:'#64748B',marginBottom:2,fontWeight:700}}>{item.l}</div>

                      </div>
                    ))}
                  </div>
                </div>;
              })}
            </div>
          </div>

        {/* RECORD TAB */}
        {tab==='record'&&(
          <div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:10}}>

              <div style={{display:'flex',gap:8,alignItems:'center'}}>

                  {STAFF.map((s,i)=><button key={s} style={{...{},padding:'5px 14px',borderRadius:10,fontWeight:700,fontSize:12,cursor:'pointer',border:`2px solid ${SCOLOR[s].dot}`,background:currentUser===s?SCOLOR[s].bg:'#fff',color:SCOLOR[s].txt}} onClick={()=>setCurrentUser(s)}>{s}</button>)}
                </div>
                <button className="btn btn-primary" onClick={()=>setRecModal({staff:currentUser})}>＋ 記録追加</button>

            <div style={{background:'#fff',borderRadius:14,boxShadow:'0 2px 8px rgba(0,0,0,.05)',overflow:'auto',border:'1px solid #E2E8F0'}}>
              {records.filter(r=>!currentUser||r.staff_name===currentUser).length===0?
                <div style={{textAlign:'center',padding:48,color:'#94A3B8'}}>記録がありません。「記録追加」から追加してください。</div>:
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
                  <thead><tr style={{background:'#F8FAFC'}}>
                    {['担当者','日付','時間帯','稼働h','架電数','着電数','アポ数','メール','アポ獲得企業',''].map(h=><th key={h} style={{padding:'10px 12px',textAlign:'left',borderBottom:'2px solid #E2E8F0',color:'#64748B',fontSize:12,fontWeight:700,whiteSpace:'nowrap'}}>{h}</th>)}
                  </tr></thead>
                  <tbody>

                      const sc=SCOLOR[r.staff_name]||SCOLOR['大坪'];

            </div>
            {/* Shift summary table */}
            <div style={{background:'#fff',borderRadius:14,padding:20,boxShadow:'0 2px 8px rgba(0,0,0,.05)',border:'1px solid #E2E8F0'}}>
              <div style={{fontWeight:700,fontSize:14,color:'#1E3A5F',marginBottom:14}}>シフト確定状況</div>
              <div style={{overflowX:'auto'}}>
                <table style={{borderCollapse:'collapse',width:'100%',fontSize:12}}>
                  <thead><tr style={{background:'#F8FAFC'}}>
                    {['スタッフ','希望シフト数','確定シフト数','予定時間','実績時間','確定率'].map(h=><th key={h} style={{padding:'8px 14px',textAlign:'left',borderBottom:'2px solid #E2E8F0',color:'#64748B',fontWeight:700}}>{h}</th>)}
                  </tr></thead>
                  <tbody>
                    {STAFF.map((staff,i)=>{
                      const st=getStats(staff);const sc=SCOLOR[staff];
                      let reqCount=0,confCount=0;
                      for(let d=1;d<=days;d++) for(const sl of SLOTS){
                        const sh=shifts[`${d}|${sl.id}|${staff}`];
                        if(sh?.requested)reqCount++;
                        if(sh?.confirmed_start)confCount++;
                      }
                      const rate=reqCount>0?Math.round(confCount/reqCount*100):0;
                      return<tr key={staff} style={{background:i%2===0?'#fff':'#FAFBFF',borderBottom:'1px solid #F1F5F9'}}>
                        <td style={{padding:'10px 14px'}}><span className="badge" style={{background:sc.bg,color:sc.txt}}>{staff}</span></td>
                        <td style={{padding:'10px 14px',fontWeight:700}}>{reqCount}件</td>
                        <td style={{padding:'10px 14px',fontWeight:700,color:'#059669'}}>{confCount}件</td>
                        <td style={{padding:'10px 14px'}}>{fH(st.planned)}h</td>
                        <td style={{padding:'10px 14px',color:'#1D4ED8',fontWeight:700}}>{fH(st.actual)}h</td>
                        <td style={{padding:'10px 14px'}}>
                          <div style={{display:'flex',alignItems:'center',gap:8}}>
                            <div style={{flex:1,background:'#E2E8F0',borderRadius:4,height:8}}>
                              <div style={{width:rate+'%',background:rate===100?'#10B981':rate>50?'#F59E0B':'#EF4444',height:8,borderRadius:4,transition:'width .3s'}}></div>
                            </div>
                            <span style={{fontWeight:700,color:rate===100?'#059669':rate>50?'#D97706':'#DC2626',minWidth:30}}>{rate}%</span>
                          </div>
                        </td>
                      </tr>;
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        )}
      </div>

      {/* SHIFT ADD MODAL */}
      {modal&&(
        <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
          <div className="modal">
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:18}}>
              <h3 style={{fontSize:16,fontWeight:800,color:'#1E3A5F'}}>{modal.day}日のシフト — {modal.staff}</h3>
              <button onClick={()=>setModal(null)} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',color:'#94A3B8'}}>&times;</button>
            </div>
            {isAdmin&&<div className="confirm-banner"><i className="ti ti-crown" style={{fontSize:16}}></i>管理者：希望登録・確定時間の設定ができます</div>}
            {modal.cellShifts.map(({sl,sh})=>(
              <div key={sl.id} style={{background:'#F8FAFC',borderRadius:12,padding:14,marginBottom:10,border:'1.5px solid #E2E8F0'}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
                  <div style={{fontWeight:700,fontSize:13}}><span className={`chip slot-${sl.cls}-conf`} style={{cursor:'default'}}>{sl.label} {sl.time}</span></div>
                  <label style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',fontSize:13}}>
                    <input type="checkbox" checked={!!sh?.confirmed_start||!!sh?.requested} onChange={async e=>{
                      if(e.target.checked){
                        await upsertShift(modal.day,sl.id,modal.staff,{requested:false,confirmed_start:'',confirmed_end:''});
                      }else{
                        await removeShift(modal.day,sl.id,modal.staff,!sh?.requested);
                      }
                    }} style={{width:16,height:16}}/>
                    希望する
                  </label>
                </div>
                {isAdmin&&(
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                    <div><label className="lbl">確定 開始</label>
                    <input className="inp" type="time" defaultValue={sh?.confirmed_start||''} onBlur={async e=>{
                      const end=document.getElementById(`end-${sl.id}-${modal.day}`);
                      if(e.target.value&&end?.value)await upsertShift(modal.day,sl.id,modal.staff,{requested:sh?.requested||false,confirmed_start:e.target.value,confirmed_end:end.value});
                    }}/></div>
                    <div><label className="lbl">確定 終了</label>
                    <input id={`end-${sl.id}-${modal.day}`} className="inp" type="time" defaultValue={sh?.confirmed_end||''}/></div>
                  </div>
                )}
              </div>
            ))}
            <div style={{display:'flex',justifyContent:'flex-end',marginTop:10}}>
              <button className="btn btn-primary" onClick={()=>setModal(null)}>完了</button>
            </div>
          </div>
        </div>
      )}

      {/* COPY MODAL */}
      {copyModal&&(
        <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setCopyModal(false)}>
          <div className="modal" style={{width:'min(500px,95vw)'}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:20}}>
              <h3 style={{fontSize:16,fontWeight:800,color:'#1E3A5F'}}>📋 シフトコピー</h3>
              <button onClick={()=>setCopyModal(false)} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',color:'#94A3B8'}}>&times;</button>
            </div>
            {/* Mode selector */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:20}}>
              {[{id:'prevMonth',lb:'前月からまるごとコピー',desc:'先月のシフトを今月に複製'},{id:'dayToDay',lb:'日付を指定してコピー',desc:'特定の日を他の日に複製'}].map(m=>(
                <div key={m.id} onClick={()=>setCopyMode(m.id)} style={{border:`2px solid ${copyMode===m.id?'#3B82F6':'#E2E8F0'}`,borderRadius:12,padding:14,cursor:'pointer',background:copyMode===m.id?'#EFF6FF':'#fff',transition:'all .15s'}}>
                  <div style={{fontWeight:700,fontSize:13,color:copyMode===m.id?'#1D4ED8':'#374151',marginBottom:4}}>{m.lb}</div>
                  <div style={{fontSize:11,color:'#64748B'}}>{m.desc}</div>
                </div>
              ))}
            </div>
            {/* Staff filter */}
            <div style={{marginBottom:16}}>
              <label className="lbl">対象スタッフ</label>
              <select className="inp" value={copyStaff} onChange={e=>setCopyStaff(e.target.value)}>
                <option value="all">全員</option>
                {STAFF.map(s=><option key={s} value={s}>{s}</option>)}
              </select>
            </div>
            {/* Day to day options */}
            {copyMode==='dayToDay'&&(
              <div style={{marginBottom:16}}>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                  <div>
                    <label className="lbl">コピー元の日</label>
                    <select className="inp" value={copyFrom} onChange={e=>setCopyFrom(e.target.value)}>
                      {dArr.map(d=><option key={d} value={d}>{d}日（{DNAMES[getDow(year,month,d)]}）</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="lbl">コピー先（複数選択可）</label>
                    <div style={{border:'1.5px solid #E2E8F0',borderRadius:10,padding:8,maxHeight:150,overflowY:'auto',background:'#fff'}}>
                      {dArr.map(d=>(
                        <label key={d} style={{display:'flex',alignItems:'center',gap:6,padding:'3px 4px',cursor:'pointer',borderRadius:6,fontSize:12,background:copyTo.includes(String(d))?'#EFF6FF':'transparent'}}>
                          <input type="checkbox" checked={copyTo.includes(String(d))} onChange={e=>setCopyTo(prev=>e.target.checked?[...prev,String(d)]:prev.filter(x=>x!==String(d)))}/>
                          {d}日（{DNAMES[getDow(year,month,d)]}）
                        </label>
                      ))}
                    </div>
                  </div>
                </div>
                {copyTo.length>0&&<div style={{marginTop:8,fontSize:12,color:'#059669',fontWeight:700}}>✓ {copyTo.length}日分にコピーします</div>}
              </div>
            )}
            {copyMode==='prevMonth'&&(
              <div style={{background:'#FFFBEB',border:'1px solid #FDE68A',borderRadius:10,padding:12,marginBottom:16,fontSize:12,color:'#92400E'}}>
                ⚠️ {year}年{month===1?12:month-1}月のシフトを {year}年{month}月にコピーします。既存のシフトは上書きされます。
              </div>
            )}
            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button className="btn btn-ghost" onClick={()=>setCopyModal(false)}>キャンセル</button>
              <button className="btn btn-primary" disabled={copying} onClick={copyMode==='prevMonth'?copyFromPrevMonth:copyDayToDay}>
                {copying?'コピー中...':'📋 コピーする'}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* RECORD MODAL */}
      {recModal&&<RecordModal staff={recModal.staff} year={year} month={month} onSave={(data)=>saveRecord(recModal.staff,data)} onClose={()=>setRecModal(null)}/>}
    </div>
  );
}
class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null}}
  static getDerivedStateFromError(err){return{err}}
  componentDidCatch(err,info){console.error('App error:',err,info)}
  render(){
    if(this.state.err){
      return(
        <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#F0F4FF',padding:20}}>
          <div style={{background:'#fff',borderRadius:16,padding:32,maxWidth:480,textAlign:'center',boxShadow:'0 10px 40px rgba(0,0,0,.1)'}}>
            <div style={{fontSize:40,marginBottom:12}}>⚠️</div>
            <h2 style={{fontSize:18,fontWeight:800,color:'#1E3A5F',marginBottom:10}}>一時的なエラーが発生しました</h2>
            <p style={{fontSize:13,color:'#64748B',marginBottom:20,lineHeight:1.7}}>データは保存されているので失われていません。下のボタンで再読み込みすれば復旧します。</p>
            <button onClick={()=>window.location.reload()} style={{background:'#3B82F6',border:'none',color:'#fff',borderRadius:10,padding:'10px 24px',fontSize:14,fontWeight:700,cursor:'pointer'}}>🔄 再読み込み</button>
            <div style={{marginTop:16,fontSize:11,color:'#CBD5E1'}}>{String(this.state.err?.message||this.state.err).substring(0,120)}</div>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}
ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>


</body></html>
